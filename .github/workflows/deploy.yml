name: Deploy to GitHub Pages
on:
  push:
    branches: [main]
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm install
      - name: Build
        run: npm run build
      - name: Verify production bundle (not dev index.html)
        run: |
          test -f dist/index.html
          grep -q 'assets/index-' dist/index.html || (echo 'dist/index.html no referencia al bundle de Vite; revisá que el build sea "vite build" y que Pages suba ./dist' && exit 1)
          ! grep -q 'src/main.tsx' dist/index.html || (echo 'dist/index.html sigue apuntando a src/main.tsx (fuente). No subas la raíz del repo como sitio.' && exit 1)
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # ACÁ ESTÁ EL SECRETO, subimos la carpeta armada
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4